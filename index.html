<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playprism | Home</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

</head>
<style>
        
        /* BG */

        body {
        background: radial-gradient(circle,#2b2d42ad 10%,#2b2d42ad 90% ), url(motherboard\ background.png);
        }

        @media (max-width: 650px) {}

        /* Navigation Bar */

        .custom-navbar {
            background: linear-gradient(135deg, #2b2d42 10%, #8d99ae 100%) !important; 
            border-bottom: 3px solid #ef233c;
        }

        .custom-navbar .navbar-brand {
            color: #ef233c !important; 
            font-weight: 700;
        }

        .custom-navbar .nav-link {
            color: #2b2d42 !important; 
            transition: color 0.2s ease-in-out;
        }

        .custom-navbar .nav-link:hover, 
        .custom-navbar .nav-link.active {
            color: #ef233c !important; 
        }
        .custom-nordic-header {
            background: linear-gradient(135deg, #2b2d42 10%, #8d99ae 100%) !important; 
            color: #8d99ae !important;
        }

        .custom-nordic-header h1 {
            color: #ef233c !important; 
        }

        .custom-sidebar-accent {
            border-top: 4px solid #ef233c !important; 
        }
        code {
            color: #ef233c !important;
            font-weight: 600;
            background-color: #f1f5f9;
            padding: 2px 6px;
            border-radius: 4px;
        }
        
        /* Info Cards */

        .center-card {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 1px;
        }
        .card-bg {
            background-color:#202236;
        }
        .card-bg-2 {
            background-color:#2b2d42;
        }
        .image-card-img {
            width: 98%;
            height: auto;
            object-fit: cover;
            display: block;
            border-radius: 4px;
        }
        .image-card:hover {
           transform: scale(0.98);
        }
        .h1-font {
            color: #ef233c !important; 
        }
        .image-title {
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            text-align: center;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            color: #ef233c !important;
        }
        .img-price {
            font: 1rem;
            font-weight: 600px;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            color: #ef233c !important;
            background-color: #202236;
            padding: 4px 8px;
            border-radius: 4px;
            text-align: center;
        }

        /* Animation Product */

        .inter-box {
            position: relative;
            background-color:#2b2d42;
            color:rgb(0, 0, 0);
            padding: 1.5rem;
            cursor: pointer;
            transition: all .5s ease;
            justify-content: center;
        }
        .inter-box:hover {
            background-color:#2b2d427e;
            color: #ffffff;
        }
        .inter-box:focus {
            outline: 10px solid #f7f7f7;
            outline-offset: 1px;
        }
        .inter-box:active {
            transform: scale(0.93);
        }
        .inter-box:after {
            content : "";
            font-weight: bold;
            color: #f7f7f7;
        } 

        /* Animation Banner */

        .inter-box-nbg {
            position: relative;
            padding: 0.5rem;
            cursor: pointer;
            transition: all .5s ease;
            justify-content: center;
            border-radius: 10px;
        }
        .inter-box-nbg:hover {
            color: #ffffff;
        }
        .inter-box-nbg:focus {
            outline: 10px solid #f7f7f7;
            outline-offset: 1px;
        }
        .inter-box-nbg:active {
            transform: scale(0.99);
        }
        .inter-box-nbg:after {
            content : "";
            font-weight: bold;
            color: #f7f7f7;
        } 

        /* Info Cards */

        .img-banner {
            width: 100%;
            height: auto;
        }

        /* footer */

        #footer {
            background: linear-gradient(135deg, #2b2d42 10%, #8d99ae 100%) !important; 
            border-top: 3px solid #ef233c;
            padding: 1rem 1rem;
        }
        .footer-font {
            font-weight: 600px;
            color:#ef233c;

        }
        .footer-margin {
            padding: 0rem 4rem;
        }

        /* Button */
        
        .link {
            cursor: pointer;
        }
</style>

<img src="./BFbanner.png" class="img-banner mt-5 mb-5 inter-box-nbg rounded-3">

    <div class="footer-margin">
        <h1 class="footer-font pb-2"> Socials: </h1>
        <p class="footer-font text-decoration-none link"><i class="bi bi-youtube"></i> YouTube</p>
        <p class="footer-font text-decoration-none link"><i class="bi bi-facebook"></i> Facebook</p>
        <p class="footer-font text-decoration-none link"><i class="bi bi-twitter-x"></i> Twitter</p>
