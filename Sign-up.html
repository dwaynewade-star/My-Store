<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playprism | Registration Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        body {
            background: radial-gradient(circle,#2b2d42ad 10%,#2b2d42ad 90% ), url(motherboard\ background.png);
        }
        .register-card {
            background-color: #ef233c50;
            backdrop-filter: blur(10px);
            border: 1px solid #be112550;
            padding: 30px;
            border-radius: 10px;
            color: white;
            width: 100%;
            max-width: 600px;
        }
        .full-width {
            width: 100%;
            max-width: 600px;
        }
        .center-card {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 31rem;
        }


        .custom-navbar {
            background: linear-gradient(135deg, #2b2d42 10%, #8d99ae 100%) !important; 
            border-bottom: 3px solid #ef233c;
        }

        .custom-navbar .navbar-brand {
            color: #ef233c !important; 
            font-weight: 700;
        }

        .custom-navbar .nav-link {
            color: #2b2d42 !important; 
            transition: color 0.2s ease-in-out;
        }

        .custom-navbar .nav-link:hover, 
        .custom-navbar .nav-link.active {
            color: #ef233c !important; 
        }
        .custom-nordic-header {
            background: linear-gradient(135deg, #2b2d42 10%, #8d99ae 100%) !important; 
            color: #8d99ae !important;
        }

        .custom-nordic-header h1 {
            color: #ef233c !important; 
        }

        .custom-sidebar-accent {
            border-top: 4px solid #ef233c !important; 
        }
        code {
            color: #ef233c !important;
            font-weight: 600;
            background-color: #f1f5f9;
            padding: 2px 6px;
            border-radius: 4px;
        }
        #footer {
            background: linear-gradient(135deg, #2b2d42 10%, #8d99ae 100%) !important; 
            border-top: 3px solid #ef233c;
            padding: 1rem 1rem;
            margin-top: 2rem;
        }
        .footer-font {
            font-weight: 600px;
            color:#ef233c;

        }
        .footer-margin {
            padding: 0rem 4rem;
        }
        
        /* Button */
        
        .link {
            cursor: pointer;
        }
    </style>
</head>
<body>

 <nav class="navbar navbar-expand-md navbar-dark custom-navbar shadow-sm sticky-top mb-5">
    <div class="container">

        <a class="navbar-brand" href="index.html">
            <i class="bi bi-joystick"></i> Playprism
        </a>
        

        <button class="navbar-toggler border-0" type="button" 
                data-bs-toggle="collapse" 
                data-bs-target="#mainDepartmentNavbar" 
                aria-controls="mainDepartmentNavbar" 
                aria-expanded="false" 
                aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button> 

        <div class="collapse navbar-collapse" id="mainDepartmentNavbar">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="Products.html">Products</a></li>
                <li class="nav-item"><a class="nav-link" href="About_Us.html">About Us</a></li>
                <li class="nav-item"><a class="nav-link active" aria-current="page" href="#">Sign In</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="center-card">
<div class="register-card">
    <h2 class="text-center mb-4">Sign up</h2>
    
    <form action="#" method="POST" onsubmit="event.preventDefault();">
        
        <div class="row mb-3">
            <div class="col-md-3 full-width">
                <label class="form-label">User Name</label>
                <input type="text" class="form-control" placeholder="User Name" required>
            </div>
        </div>


        <div class="mb-3">
            <label class="form-label">Email Address</label>
            <div class="input-group">
                <span class="input-group-text">@</span>
                <input type="text" class="form-control" placeholder="" required>
                <span class="input-group-text">@email.com</span>
            </div>
        </div>


        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" placeholder="Create password" required>
            </div>


            <div class="col-md-6">
                <label class="form-label">Confirm Password</label>
                <input type="password" class="form-control" placeholder="Retype password" required>
            </div>
        </div>


        <div class="mb-4 form-check">
            <input class="form-check-input" type="checkbox" id="terms" checked required>
            <label class="form-check-label small text-white-50" for="terms">
                I agree to the digital Data Privacy Policy rules.
            </label>
        </div>

         <a href="sign-in.html" target="_blank" class="text-decoration-none text-white text-bold">
            Already have an account? Sign in here!
        </a>


        <button type="submit" class="btn btn-danger w-100 py-2 mt-3">Sign Up</button>
    </form>
</div>
</div>
<footer id="footer">
    <div class="footer-margin">
        <h1 class="footer-font pb-2"> Socials: </h1>
        <p class="footer-font text-decoration-none link"><i class="bi bi-youtube"></i> YouTube</p>
        <p class="footer-font text-decoration-none link"><i class="bi bi-facebook"></i> Facebook</p>
        <p class="footer-font text-decoration-none link"><i class="bi bi-twitter-x"></i> Twitter</p>
        <p class="footer-font text-decoration-none link"><i class="bi bi-tiktok"></i> Tiktok</p>
    </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</body>
</html>
