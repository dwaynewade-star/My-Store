<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playprism | Login Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>

        body {
            background: radial-gradient(circle,#2b2d42ad 10%,#2b2d42ad 90% ), url(motherboard\ background.png);
        }

        .center-card {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 31rem;
        }
    
        .login-card {
            background-color: #ef233c50;
            backdrop-filter: blur(10px);
            border: 1px solid #be112550;
            padding: 40px;
            border-radius: 10px;
            color: white;
            width: 100%;
            max-width: 450px;
        }
        .custom-navbar {
            background: linear-gradient(135deg, #2b2d42 10%, #8d99ae 100%) !important; 
            border-bottom: 3px solid #ef233c;
        }

        .custom-navbar .navbar-brand {
            color: #ef233c !important; 
            font-weight: 700;
        }

        .custom-navbar .nav-link {
            color: #2b2d42 !important; 
            transition: color 0.2s ease-in-out;
        }

        .custom-navbar .nav-link:hover, 
        .custom-navbar .nav-link.active {
            color: #ef233c !important; 
        }
        .custom-nordic-header {
            background: linear-gradient(135deg, #2b2d42 10%, #8d99ae 100%) !important; 
            color: #8d99ae !important;
        }

        .custom-nordic-header h1 {
            color: #ef233c !important; 
        }

        .custom-sidebar-accent {
            border-top: 4px solid #ef233c !important; 
        }
        code {
            color: #ef233c !important;
            font-weight: 600;
            background-color: #f1f5f9;
            padding: 2px 6px;
            border-radius: 4px;
        }
        #footer {
            background: linear-gradient(135deg, #2b2d42 10%, #8d99ae 100%) !important; 
            border-top: 3px solid #ef233c;
            padding: 1rem 1rem;
            margin-top: 2rem;
        }
        .footer-font {
            font-weight: 600px;
            color:#ef233c;

        }
        .footer-margin {
            padding: 0rem 4rem;
        }
        
        /* Button */
        
        .link {
            cursor: pointer;
        }
    </style>
</head>
<body>
    
    <nav class="navbar navbar-expand-md navbar-dark custom-navbar shadow-sm sticky-top mb-4">
    <div class="container">

        <a class="navbar-brand" href="index.html">
            <i class="bi bi-joystick"></i> Playprism
        </a>
        

        <button class="navbar-toggler border-0" type="button" 
                data-bs-toggle="collapse" 
                data-bs-target="#mainDepartmentNavbar" 
                aria-controls="mainDepartmentNavbar" 
                aria-expanded="false" 
                aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button> 

        <div class="collapse navbar-collapse" id="mainDepartmentNavbar">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="Products.html">Products</a></li>
                <li class="nav-item"><a class="nav-link" href="About_Us.html">About Us</a></li>
                <li class="nav-item"><a class="nav-link active" aria-current="page" href="#">Sign In</a></li>
            </ul>
        </div>
    </div>
</nav>


<div class="center-card">

    <div class="login-card">

    <h1 class="text-center mb-5">Sign In</h1>
    
    <form action="#" method="POST">
        
        <div class="form-floating mb-3">
            <input type="email" class="form-control form-control-lg text-dark" id="emailInput" placeholder="name@example.com" required>
            <label for="emailInput" class="text-dark">Email Address</label>
        </div>
        
        <div class="form-floating mb-3">
            <input type="password" class="form-control form-control-lg text-dark" id="passwordInput" placeholder="Password" required>
            <label for="passwordInput" class="text-dark">Password</label>
        </div>
        <a href="Sign-up.html" target="_blank" class="text-decoration-none text-white text-bold">
            Don't have an account? Sign up here!
        </a>


        <button type="submit" class="btn btn-danger w-100 btn-lg mt-2">Sign In</button>
    </form>

    </div>

</div>
<footer id="footer">
    <div class="footer-margin">
        <h1 class="footer-font pb-2"> Socials: </h1>
         <p class="footer-font text-decoration-none link"><i class="bi bi-youtube"></i> YouTube</p>
        <p class="footer-font text-decoration-none link"><i class="bi bi-facebook"></i> Facebook</p>
        <p class="footer-font text-decoration-none link"><i class="bi bi-twitter-x"></i> Twitter</p>
        <p class="footer-font text-decoration-none link"><i class="bi bi-tiktok"></i> Tiktok</p>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
